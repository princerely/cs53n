<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Literacy Tech Tree</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B0F19;
            --panel-bg: #1A202C;
            --text-main: #E2E8F0;
            --text-muted: #A0AEC0;
            --locked-bg: #2D3748;
            --locked-border: #4A5568;
            --available-bg: rgba(217, 119, 6, 0.15);
            --available-border: #D97706; /* Muted Gold */
            --progress-bg: rgba(56, 189, 248, 0.15);
            --progress-border: #38BDF8; /* Blue */
            --completed-bg: rgba(34, 197, 94, 0.15);
            --completed-border: #22C55E; /* Neon Green */
            --danger-bg: rgba(239, 68, 68, 0.15);
            --danger-border: #EF4444; /* Red */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            user-select: none;
        }

        /* Top Bar */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: rgba(11, 15, 25, 0.9);
            border-bottom: 1px solid var(--locked-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .action-btn {
            background-color: var(--locked-bg);
            color: var(--text-main);
            border: 1px solid var(--locked-border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap; /* Prevents text from wrapping into icon */
            flex-shrink: 0; /* Prevents button from squishing */
        }

        .action-btn svg {
            flex-shrink: 0; /* Prevents SVG icon from distorting */
        }

        .action-btn:hover:not(:disabled) {
            background-color: var(--locked-border);
            color: #fff;
        }

        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #reset-btn {
            border-color: var(--danger-border);
            color: var(--danger-border);
            background-color: var(--danger-bg);
        }

        #reset-btn:hover {
            background-color: var(--danger-border);
            color: #fff;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #progress-indicator {
            font-weight: 600;
            color: var(--completed-border);
            white-space: nowrap;
        }

        .legend {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* Responsive safety for narrower screens */
        @media (max-width: 1000px) {
            .legend { display: none; }
            h1 { font-size: 1rem; }
        }

        /* Canvas Area */
        #canvas-wrapper {
            position: absolute;
            top: 60px;
            bottom: 0;
            left: 0;
            right: 0;
            cursor: grab;
            overflow: hidden;
        }

        #canvas-wrapper:active {
            cursor: grabbing;
        }

        #tree-container {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }

        svg.connections {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Nodes */
        .node {
            position: absolute;
            width: 220px;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid;
            background-color: var(--locked-bg);
            border-color: var(--locked-border);
            color: var(--text-muted);
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .node:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }

        .node.root {
            width: 260px;
            padding: 20px;
        }

        .node-icon {
            font-size: 1.5rem;
        }

        .node-title {
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.2;
        }

        .node-status {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 800;
        }

        /* Node States */
        .node.locked {
            pointer-events: none;
            opacity: 0.6;
        }
        
        .node.available {
            background-color: var(--available-bg);
            border-color: var(--available-border);
            color: var(--text-main);
        }
        
        .node.in-progress {
            background-color: var(--progress-bg);
            border-color: var(--progress-border);
            color: var(--text-main);
        }

        .node.completed {
            background-color: var(--completed-bg);
            border-color: var(--completed-border);
            color: #fff;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        /* Modal */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        #modal {
            background-color: var(--panel-bg);
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            border-radius: 16px;
            border: 1px solid var(--locked-border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease-out forwards;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        #close-modal:hover { color: #fff; }

        #modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.5rem;
            font-weight: 800;
        }

        #modal-desc {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .checklist {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: var(--locked-bg);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .check-item:hover {
            background: var(--locked-border);
        }

        .check-item input[type="checkbox"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            accent-color: var(--completed-border);
            cursor: pointer;
        }

        .check-item label {
            font-size: 0.9rem;
            line-height: 1.4;
            cursor: pointer;
            flex: 1;
        }

        .check-item.checked label {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        #complete-btn {
            margin-top: 10px;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: not-allowed;
            background-color: var(--locked-border);
            color: var(--text-muted);
            transition: all 0.3s;
        }

        #complete-btn.active {
            cursor: pointer;
            background-color: var(--completed-border);
            color: #fff;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        #complete-btn.active:hover {
            background-color: #16a34a;
        }

        #complete-btn.finished {
            background-color: var(--locked-bg);
            color: var(--completed-border);
            border: 1px solid var(--completed-border);
            cursor: default;
        }

        /* Path Animations */
        .link-line {
            fill: none;
            stroke-width: 3px;
            transition: stroke 0.5s ease;
        }
        .link-locked { stroke: var(--locked-border); stroke-dasharray: 5, 5; }
        .link-available { stroke: var(--available-border); }
        .link-completed { stroke: var(--completed-border); }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            border: 1px solid var(--locked-border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 300;
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="header-left">
            <h1>AI Literacy Tech Tree</h1>
            <button id="undo-btn" class="action-btn" disabled>

        <div class="header-right">

                <div class="legend-item"><div class="legend-color" style="background: var(--completed-bg); border: 1px solid var(--completed-border);"></div> Completed</div>
            </div>
        </div>
    </div>

    <div id="canvas-wrapper">
        <div id="tree-container">
            <svg id="lines-svg" class="connections"></svg>
            <div id="nodes-layer"></div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal">

            <div class="checklist" id="modal-checklist">
                </div>
            <button id="complete-btn">Complete Checklist to Unlock</button>
        </div>
    </div>

    <div id="toast" class="toast">Action Undone</div>

// --- APP STATE & LOGIC ---

let progressData = {}; 
let historyStack = []; 

const svgEl = document.getElementById('lines-svg');
const nodesLayer = document.getElementById('nodes-layer');
const progressIndicator = document.getElementById('progress-indicator');
const undoBtn = document.getElementById('undo-btn');
const resetBtn = document.getElementById('reset-btn');
const toast = document.getElementById('toast');

// Layout Constants
const X_OFFSET_START = 50;
const Y_OFFSET_START = 50;
const COLUMN_WIDTH = 350;
const ROW_HEIGHT = 180;

// Initialize State
function init() {
    // Force blank slate on initial page load if no storage exists yet
    if (!localStorage.getItem('ai_tree_progress_init')) {
        localStorage.removeItem('ai_tree_progress');
        localStorage.setItem('ai_tree_progress_init', 'true');
    }
    
    loadProgress();
    buildTreeLayout();
    updateDerivedStates();
    renderNodes();
    updateProgressUI();
    
    window.addEventListener('resize', drawLines);
    
    // Event Listeners
    undoBtn.addEventListener('click', handleUndo);
    resetBtn.addEventListener('click', handleReset);
}

// Global Reset Function
function handleReset() {
    if(confirm("Are you sure you want to reset all paths? This will erase all your progress.")) {
        localStorage.removeItem('ai_tree_progress');
        historyStack = [];
        undoBtn.disabled = true;
        progressData = {};
        
        loadProgress(); // Re-initializes blank data
        updateDerivedStates();
        renderNodes();
        updateProgressUI();
        
        showToast("All paths have been reset.");
    }
}

// History Management
function saveStateToHistory() {
    historyStack.push(JSON.stringify(progressData));
    if (historyStack.length > 20) historyStack.shift(); 
    undoBtn.disabled = false;
}

function handleUndo() {
    if (historyStack.length === 0) return;
    
    const previousState = historyStack.pop();
    progressData = JSON.parse(previousState);
    saveProgress(); 
    
    updateDerivedStates();
    renderNodes();
    updateProgressUI();
    
    if (modalOverlay.style.display === 'flex' && activeNodeId) {
        openModal(treeData.find(n => n.id === activeNodeId), true);
    }
    
    if (historyStack.length === 0) undoBtn.disabled = true;
    showToast("Action Undone");
}

function showToast(msg) {
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 2000);
}

// Build Blank Data Structure
function loadProgress() {
    const saved = localStorage.getItem('ai_tree_progress');
    if (saved) {
        progressData = JSON.parse(saved);
    }
    
    treeData.forEach(node => {
        if (!progressData[node.id]) {
            progressData[node.id] = {
                status: node.parentId === null ? 'available' : 'locked',
                checklist: new Array(node.checklist.length).fill(false)
            };
        }
    });
}

function saveProgress() {
    localStorage.setItem('ai_tree_progress', JSON.stringify(progressData));
}

// Compute dynamic logic
function updateDerivedStates() {
    let changed = false;
    
    treeData.forEach(node => {
        if (node.parentId !== null) {
            const parentState = progressData[node.parentId].status;
            const currentState = progressData[node.id].status;
            
            if (parentState === 'completed' && currentState === 'locked') {
                progressData[node.id].status = 'available';
                changed = true;
            }
            
            if (parentState !== 'completed' && currentState !== 'locked' && !progressData[node.id].checklist.some(c=>c)) {
                progressData[node.id].status = 'locked';
                changed = true;
            }
        }
        
        const checks = progressData[node.id].checklist;
        const hasChecks = checks.some(c => c === true);
        const allChecks = checks.every(c => c === true);
        const state = progressData[node.id].status;
        
        if (state === 'available' && hasChecks && !allChecks) {
            progressData[node.id].status = 'in-progress';
            changed = true;
        } else if (state === 'in-progress' && !hasChecks) {
             progressData[node.id].status = 'available';
             changed = true;
        }
    });
    
    if (changed) saveProgress();
}

// Layout logic
function buildTreeLayout() {
    const childrenMap = {};
    treeData.forEach(n => { childrenMap[n.id] = []; });
    treeData.forEach(n => { if (n.parentId) childrenMap[n.parentId].push(n); });

    const depths = {};
    treeData.forEach(n => { if (!n.parentId) depths[n.id] = 0; });
    
    let changed = true;
    while(changed) {
        changed = false;
        treeData.forEach(n => {
            if (n.parentId && depths[n.parentId] !== undefined && depths[n.id] === undefined) {
                depths[n.id] = depths[n.parentId] + 1;
                changed = true;
            }
        });
    }

    const roots = treeData.filter(n => !n.parentId);
    let currentY = 0;

    function traverseAndPosition(nodeId, depth, startY) {
        const node = treeData.find(n => n.id === nodeId);
        node.x = X_OFFSET_START + (depth * COLUMN_WIDTH);
        
        const children = childrenMap[nodeId];
        if (children.length === 0) {
            node.y = startY;
            return startY + ROW_HEIGHT;
        } else {
            let childStartY = startY;
            let sumY = 0;
            children.forEach(child => {
                const nextY = traverseAndPosition(child.id, depth + 1, childStartY);
                sumY += treeData.find(n => n.id === child.id).y;
                childStartY = nextY;
            });
            node.y = sumY / children.length; 
            return childStartY;
        }
    }

    roots.forEach(root => {
        currentY = traverseAndPosition(root.id, 0, currentY);
        currentY += ROW_HEIGHT * 0.5; 
    });
}

// Render DOM Nodes
function renderNodes() {
    nodesLayer.innerHTML = '';
    
    treeData.forEach(node => {
        const status = progressData[node.id].status;
        const el = document.createElement('div');
        
        el.className = `node ${status} ${node.parentId === null ? 'root' : ''}`;
        el.style.left = `${node.x}px`;
        el.style.top = `${node.y}px`;
        el.id = `node-dom-${node.id}`;
        
        const statusText = status.replace('-', ' ');
        
        el.innerHTML = `
            <div class="node-icon">${node.icon}</div>
            <div class="node-title">${node.label}</div>
            <div class="node-status">${statusText}</div>
        `;
        
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            if (status !== 'locked') {
                openModal(node);
            }
        });
        
        nodesLayer.appendChild(el);
    });
    
    let maxX = 0, maxY = 0;
    treeData.forEach(n => {
        if (n.x > maxX) maxX = n.x;
        if (n.y > maxY) maxY = n.y;
    });
    
    document.getElementById('tree-container').style.width = `${maxX + 400}px`;
    document.getElementById('tree-container').style.height = `${maxY + 400}px`;
    
    drawLines();
}

// Draw SVG Connections
function drawLines() {
    svgEl.innerHTML = '';
    
    treeData.forEach(node => {
        if (node.parentId) {
            const parent = treeData.find(n => n.id === node.parentId);
            const pDom = document.getElementById(`node-dom-${parent.id}`);
            const cDom = document.getElementById(`node-dom-${node.id}`);
            
            if(!pDom || !cDom) return;
            
            const px = parent.x + pDom.offsetWidth;
            const py = parent.y + (pDom.offsetHeight / 2);
            
            const cx = node.x;
            const cy = node.y + (cDom.offsetHeight / 2);
            
            const pState = progressData[parent.id].status;
            const cState = progressData[node.id].status;
            
            let lineClass = "link-locked";
            if (pState === 'completed' && cState !== 'locked') lineClass = "link-available";
            if (pState === 'completed' && cState === 'completed') lineClass = "link-completed";

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const d = `M ${px} ${py} C ${px + 80} ${py}, ${cx - 80} ${cy}, ${cx} ${cy}`;
            
            path.setAttribute('d', d);
            path.setAttribute('class', `link-line ${lineClass}`);
            svgEl.appendChild(path);
        }
    });
}

function updateProgressUI() {
    const completed = Object.values(progressData).filter(n => n.status === 'completed').length;
    progressIndicator.innerText = `${completed} / ${treeData.length} Nodes Mastered`;
}

// --- MODAL LOGIC ---
const modalOverlay = document.getElementById('modal-overlay');
const completeBtn = document.getElementById('complete-btn');
let activeNodeId = null;

function openModal(node, isRefresh = false) {
    activeNodeId = node.id;
    const state = progressData[node.id];
    
    document.getElementById('modal-icon').innerText = node.icon;
    document.getElementById('modal-title').innerText = node.label;
    document.getElementById('modal-desc').innerText = node.description;
    
    const checklistContainer = document.getElementById('modal-checklist');
    checklistContainer.innerHTML = '';
    
    node.checklist.forEach((task, index) => {
        const isChecked = state.checklist[index];
        const item = document.createElement('div');
        item.className = `check-item ${isChecked ? 'checked' : ''}`;
        
        item.innerHTML = `
            <input type="checkbox" id="check-${index}" ${isChecked ? 'checked' : ''}>
            <label for="check-${index}">${task}</label>
        `;
        
        item.querySelector('input').addEventListener('change', (e) => {
            saveStateToHistory();
            toggleChecklist(node.id, index, e.target.checked);
        });
        
        checklistContainer.appendChild(item);
    });
    
    checkCompletionLogic();
    modalOverlay.style.display = 'flex';
    if(isRefresh) {
        document.getElementById('modal').style.animation = 'none';
    } else {
        document.getElementById('modal').style.animation = 'slideIn 0.3s ease-out forwards';
    }
}

document.getElementById('close-modal').addEventListener('click', () => {
    modalOverlay.style.display = 'none';
    updateDerivedStates();
    renderNodes();
});

function toggleChecklist(nodeId, taskIndex, isChecked) {
    progressData[nodeId].checklist[taskIndex] = isChecked;
    
    const checks = document.querySelectorAll('.check-item');
    if (checks[taskIndex]) {
        if(isChecked) checks[taskIndex].classList.add('checked');
        else checks[taskIndex].classList.remove('checked');
    }
    
    const nodeState = progressData[nodeId].status;
    if (nodeState === 'available' || nodeState === 'in-progress') {
        const hasAny = progressData[nodeId].checklist.some(c=>c);
        progressData[nodeId].status = hasAny ? 'in-progress' : 'available';
    }
    
    saveProgress();
    checkCompletionLogic();
}

function checkCompletionLogic() {
    const state = progressData[activeNodeId];
    const allChecked = state.checklist.every(c => c === true);
    
    completeBtn.className = '';
    
    if (state.status === 'completed') {
        completeBtn.innerText = 'Mastered';
        completeBtn.classList.add('finished');
        completeBtn.onclick = null;
    } else if (allChecked) {
        completeBtn.innerText = 'Confirm Mastery & Unlock Path';
        completeBtn.classList.add('active');
        completeBtn.onclick = () => {
            saveStateToHistory();
            finishNode(activeNodeId);
        };
    } else {
        completeBtn.innerText = 'Complete Checklist to Unlock';
        completeBtn.onclick = null;
    }
}

function finishNode(nodeId) {
    progressData[nodeId].status = 'completed';
    saveProgress();
    updateDerivedStates();
    
    completeBtn.innerText = 'Mastered';
    completeBtn.className = 'finished';
    completeBtn.onclick = null;
    
    updateProgressUI();
    renderNodes();
}

// --- PAN AND ZOOM LOGIC ---
const wrapper = document.getElementById('canvas-wrapper');
const container = document.getElementById('tree-container');

let isDragging = false;
let startX, startY;
let translateX = 0, translateY = 0;
let scale = 1;

wrapper.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
});

window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mouseleave', () => { isDragging = false; });

window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    translateX = e.clientX - startX;
    translateY = e.clientY - startY;
    applyTransform();
});

wrapper.addEventListener('wheel', (e) => {
    if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        const zoomFactor = e.deltaY * -0.002; 
        scale = Math.min(Math.max(0.2, scale + zoomFactor), 2);
    } 
    else {
        translateX -= e.deltaX;
        translateY -= e.deltaY;
    }
    applyTransform();
}, { passive: false });

function applyTransform() {
    container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
}

// Start sequence
window.onload = () => {
    init();
    translateX = 50;
    translateY = 50;
    
    if(window.innerWidth < 1200) scale = 0.8;
    if(window.innerWidth < 800) scale = 0.5;
    
    applyTransform();
};

</script>
