<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Literacy Tech Tree</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B0F19;
            --panel-bg: #1A202C;
            --text-main: #E2E8F0;
            --text-muted: #A0AEC0;
            --locked-bg: #2D3748;
            --locked-border: #4A5568;
            --available-bg: rgba(217, 119, 6, 0.15);
            --available-border: #D97706; /* Muted Gold */
            --progress-bg: rgba(56, 189, 248, 0.15);
            --progress-border: #38BDF8; /* Blue */
            --completed-bg: rgba(34, 197, 94, 0.15);
            --completed-border: #22C55E; /* Neon Green */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            user-select: none;
        }

        /* Top Bar */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: rgba(11, 15, 25, 0.9);
            border-bottom: 1px solid var(--locked-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #progress-indicator {
            font-weight: 600;
            color: var(--completed-border);
        }

        .legend {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.85rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        #undo-btn {
            background-color: var(--locked-bg);
            border: 1px solid var(--locked-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            margin-right: 15px;
            transition: all 0.2s;
        }

        #undo-btn:hover:not(:disabled) {
            background-color: var(--locked-border);
        }

        #undo-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Canvas Area */
        #canvas-wrapper {
            position: absolute;
            top: 60px;
            bottom: 0;
            left: 0;
            right: 0;
            cursor: grab;
            overflow: hidden;
        }

        #canvas-wrapper:active {
            cursor: grabbing;
        }

        #tree-container {
            position: absolute;
            transform-origin: 0 0;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Nodes */
        .node {
            position: absolute;
            width: 220px;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid;
            background-color: var(--locked-bg);
            border-color: var(--locked-border);
            color: var(--text-muted);
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .node:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }

        .node.root {
            width: 260px;
            padding: 20px;
        }

        .node-icon {
            font-size: 1.5rem;
        }

        .node-title {
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.2;
        }

        .node-status {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 800;
        }

        /* Node States */
        .node.locked {
            pointer-events: none;
            opacity: 0.6;
        }
        
        .node.available {
            background-color: var(--available-bg);
            border-color: var(--available-border);
            color: var(--text-main);
        }
        
        .node.in-progress {
            background-color: var(--progress-bg);
            border-color: var(--progress-border);
            color: var(--text-main);
        }

        .node.completed {
            background-color: var(--completed-bg);
            border-color: var(--completed-border);
            color: #fff;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        /* Modal */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        #modal {
            background-color: var(--panel-bg);
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            border-radius: 16px;
            border: 1px solid var(--locked-border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease-out forwards;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        #close-modal:hover { color: #fff; }

        #modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.5rem;
            font-weight: 800;
        }

        #modal-desc {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .checklist {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: var(--locked-bg);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .check-item:hover {
            background: var(--locked-border);
        }

        .check-item input[type="checkbox"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            accent-color: var(--completed-border);
            cursor: pointer;
        }

        .check-item label {
            font-size: 0.9rem;
            line-height: 1.4;
            cursor: pointer;
            flex: 1;
        }

        .check-item.checked label {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        #complete-btn {
            margin-top: 10px;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: not-allowed;
            background-color: var(--locked-border);
            color: var(--text-muted);
            transition: all 0.3s;
        }

        #complete-btn.active {
            cursor: pointer;
            background-color: var(--completed-border);
            color: #fff;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        #complete-btn.active:hover {
            background-color: #16a34a;
        }

        #complete-btn.finished {
            background-color: var(--locked-bg);
            color: var(--completed-border);
            border: 1px solid var(--completed-border);
            cursor: default;
        }

        /* Path Animations */
        .link-line {
            fill: none;
            stroke-width: 3px;
            transition: stroke 0.5s ease;
        }
        .link-locked { stroke: var(--locked-border); stroke-dasharray: 5, 5; }
        .link-available { stroke: var(--available-border); }
        .link-completed { stroke: var(--completed-border); }
    </style>
</head>
<body>

    <div id="top-bar">
        <h1>AI Literacy Tech Tree</h1>
        <div id="progress-indicator">0 / 25 Nodes Mastered</div>
        <div class="legend">
            <button id="undo-btn" disabled>↶ Undo</button>

            <div class="legend-item"><div class="legend-color" style="background: var(--progress-bg); border: 1px solid var(--progress-border);"></div> In Progress</div>
            <div class="legend-item"><div class="legend-color" style="background: var(--completed-bg); border: 1px solid var(--completed-border);"></div> Completed</div>
